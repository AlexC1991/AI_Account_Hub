name: Build Windows executable

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  windows-portable:
    name: Windows x64 portable
    runs-on: windows-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-build.txt

      - name: Install build dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-build.txt

      - name: Verify tag matches package version
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          $version = python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])"
          if ("${{ github.ref_name }}" -ne "v$version") {
            throw "Tag ${{ github.ref_name }} does not match package version $version"
          }

      - name: Build and smoke-test portable executable
        shell: pwsh
        run: .\scripts\build-windows.ps1

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v6
        with:
          name: AI-Account-Hub-Windows-x64
          path: |
            dist/AI-Account-Hub-*-windows-x64.zip
            dist/AI-Account-Hub-*-windows-x64.sha256.txt
          if-no-files-found: error
          retention-days: 14

      - name: Attach artifact to draft GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $PSNativeCommandUseErrorActionPreference = $false
          $tag = "${{ github.ref_name }}"
          $artifact = Get-ChildItem dist\AI-Account-Hub-*-windows-x64.zip | Select-Object -First 1
          $checksum = Get-ChildItem dist\AI-Account-Hub-*-windows-x64.sha256.txt | Select-Object -First 1
          if (-not $artifact) { throw "Release artifact was not created" }
          if (-not $checksum) { throw "Release checksum was not created" }
          gh release view $tag *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $tag $artifact.FullName $checksum.FullName --clobber
          } else {
            gh release create $tag $artifact.FullName $checksum.FullName --draft --title "AI Account Hub $tag" --notes-file RELEASE_NOTES.md
          }
